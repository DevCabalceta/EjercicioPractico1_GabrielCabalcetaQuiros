# Nombre de la aplicación
spring.application.name=EjercicioPractico1

# OBLIGATORIO: Puerto 47 para el servidor web según el requerimiento
server.port=47

# OBLIGATORIO: Conexión a la base de datos gimnasio_fitness
spring.datasource.url=jdbc:mysql://localhost:3306/gimnasio_fitness?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

# OBLIGATORIO: Usuario y contraseña del script
spring.datasource.username=usuario_caso_practico_01
spring.datasource.password=123456

# Driver de MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de JPA / Hibernate (Puesto en 'none' porque ya creamos las tablas con el script)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Desactivar caché de Thymeleaf para ver los cambios de HTML al recargar la página
spring.thymeleaf.cache=false

# Eliminar banner de Spring para mantener la consola limpia
spring.main.banner-mode=off
