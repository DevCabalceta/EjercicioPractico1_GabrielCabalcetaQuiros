<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gimnasio Fitness</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        body {
            background-color: #f5f5f7; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #1d1d1f;
            min-height: 100vh;
        }
        .navbar {
            background-color: rgba(255, 255, 255, 0.8) !important;
            backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid #e5e5ea;
        }
        .navbar-brand {
            font-weight: 600;
            letter-spacing: -0.5px;
            color: #1d1d1f !important;
        }
        .nav-link {
            color: #1d1d1f !important;
            font-size: 14px;
        }
        .card-fitness {
            background: #ffffff;
            border: none;
            border-radius: 18px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.04);
            transition: transform 0.3s ease;
        }
        .btn-fitness {
            border-radius: 980px;
            font-weight: 500;
            padding: 8px 20px;
        }
    </style>
</head>
<body>

    <header th:fragment="header">
        <nav class="navbar navbar-expand-lg fixed-top">
            <div class="container">
                <a class="navbar-brand" href="/">
                    <i class="bi bi-activity text-primary me-2"></i>GymFitness
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="/"><i class="bi bi-house me-1"></i>Inicio</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/categoria/listado"><i class="bi bi-tags me-1"></i>Categorías</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/servicio/listado"><i class="bi bi-card-list me-1"></i>Clases</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/reserva/listado"><i class="bi bi-calendar-check me-1"></i>Reservas</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/contacto"><i class="bi bi-envelope me-1"></i>Contacto</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
        <div style="height: 70px;"></div> 
    </header>

    <footer th:fragment="footer" class="text-center py-4 mt-5 text-muted" style="font-size: 12px;">
        <div class="container border-top pt-3">
            <p>&copy; 2026 Gimnasio Fitness. Todos los derechos reservados.</p>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </footer>

</body>
</html>
