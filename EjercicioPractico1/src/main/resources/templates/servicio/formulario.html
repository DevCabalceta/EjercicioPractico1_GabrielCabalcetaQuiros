<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/plantilla :: head}"></head>
<body>
    <header th:replace="~{layout/plantilla :: header}"></header>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                
                <div class="d-flex align-items-center mb-4">
                    <a th:href="@{/servicio/listado}" class="btn btn-light rounded-circle me-3 shadow-sm text-dark" style="width: 42px; height: 42px; padding: 8px;">
                        <i class="bi bi-arrow-left fs-5"></i>
                    </a>
                    <h2 class="fw-bold m-0" style="letter-spacing: -0.5px;" th:text="${servicio.id != null ? 'Editar Clase' : 'Nueva Clase'}"></h2>
                </div>

                <div class="card-fitness p-5">
                    <form th:action="@{/servicio/guardar}" th:object="${servicio}" method="post">
                        <input type="hidden" th:field="*{id}"/>

                        <div class="mb-4">
                            <label class="form-label fw-semibold text-muted small text-uppercase" style="letter-spacing: 0.5px;">Nombre de la Clase</label>
                            <input type="text" class="form-control form-control-lg bg-light border-0" style="border-radius: 12px; font-size: 16px;" th:field="*{nombre}" placeholder="Ej. Entrenamiento Funcional VIP" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-4">
                                <label class="form-label fw-semibold text-muted small text-uppercase" style="letter-spacing: 0.5px;">Precio (₡)</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-0 text-muted" style="border-top-left-radius: 12px; border-bottom-left-radius: 12px;">₡</span>
                                    <input type="number" step="0.01" class="form-control form-control-lg bg-light border-0" style="border-top-right-radius: 12px; border-bottom-right-radius: 12px; font-size: 16px;" th:field="*{precio}" placeholder="0.00" required>
                                </div>
                            </div>

                            <div class="col-md-6 mb-5">
                                <label class="form-label fw-semibold text-muted small text-uppercase" style="letter-spacing: 0.5px;">Categoría</label>
                                <select class="form-select form-select-lg bg-light border-0" style="border-radius: 12px; font-size: 16px;" th:field="*{categoria.id}" required>
                                    <option value="" disabled selected>Seleccione...</option>
                                    <option th:each="cat : ${categorias}" 
                                            th:value="${cat.id}" 
                                            th:text="${cat.nombre}"></option>
                                </select>
                            </div>
                        </div>

                        <div class="d-grid mt-2">
                            <button type="submit" class="btn btn-dark btn-fitness btn-lg">
                                Guardar Información <i class="bi bi-check2 me-1"></i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="~{layout/plantilla :: footer}"></footer>
</body>
</html>
