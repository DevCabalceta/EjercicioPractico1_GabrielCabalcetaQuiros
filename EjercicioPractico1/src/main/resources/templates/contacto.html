<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/plantilla :: head}"></head>
<body>
    <header th:replace="~{layout/plantilla :: header}"></header>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-lg-7 text-center mb-4">
                <h2 class="fw-bold" style="letter-spacing: -0.5px;">Ponte en contacto</h2>
                <p class="text-muted">¿Tienes dudas sobre nuestras clases o membresías? Escríbenos.</p>
            </div>
        </div>
        
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="card-fitness p-5">
                    <form th:action="@{/}" method="get">
                        <div class="mb-4">
                            <label class="form-label fw-semibold text-muted small text-uppercase">Nombre Completo</label>
                            <input type="text" class="form-control form-control-lg bg-light border-0" style="border-radius: 12px;">
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold text-muted small text-uppercase">Correo Electrónico</label>
                            <input type="email" class="form-control form-control-lg bg-light border-0" style="border-radius: 12px;">
                        </div>
                        <div class="mb-5">
                            <label class="form-label fw-semibold text-muted small text-uppercase">Mensaje</label>
                            <textarea class="form-control bg-light border-0" style="border-radius: 12px;" rows="4"></textarea>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-fitness btn-lg">
                                Enviar Mensaje <i class="bi bi-send ms-2"></i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="~{layout/plantilla :: footer}"></footer>
</body>
</html>
